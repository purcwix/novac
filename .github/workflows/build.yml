name: Build

on:
  push:
    branches: [ master, main ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86-64
            os: ubuntu-latest
            artifact: novac-linux-x86_64

          - name: Windows x86-64 (MinGW)
            os: windows-latest
            artifact: novac-windows-x86_64

          - name: macOS x86-64
            os: macos-13
            artifact: novac-macos-x86_64

          - name: macOS ARM64
            os: macos-latest
            artifact: novac-macos-arm64

          - name: Linux ARM64 (cross)
            os: ubuntu-latest
            artifact: novac-linux-arm64
            cross: true

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # ── Linux native ─────────────────────────────────────────
      - name: Install deps (Linux native)
        if: runner.os == 'Linux' && !matrix.cross
        run: sudo apt-get update && sudo apt-get install -y libffi-dev libssl-dev cmake

      # ── Linux ARM64 cross ────────────────────────────────────
      - name: Install deps (Linux ARM64 cross)
        if: matrix.cross
        run: |
          sudo dpkg --add-architecture arm64
          # Restrict all existing sources to amd64 only
          sudo sed -i 's/^deb http/deb [arch=amd64] http/; s/^deb https/deb [arch=amd64] https/' /etc/apt/sources.list
          sudo find /etc/apt/sources.list.d/ -name "*.list" \
            -exec sudo sed -i 's/^deb http/deb [arch=amd64] http/; s/^deb https/deb [arch=amd64] https/' {} \;
          # Add arm64 ports sources (security.ubuntu.com doesn't serve arm64)
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports $(lsb_release -cs) main restricted universe multiverse" | sudo tee /etc/apt/sources.list.d/arm64.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports $(lsb_release -cs)-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/arm64.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports $(lsb_release -cs)-security main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/arm64.list
          # Ignore failures from security.ubuntu.com (no arm64 packages there)
          sudo apt-get update -o Acquire::AllowInsecureRepositories=true 2>&1 | grep -v "404\|Failed to fetch" || true
          sudo apt-get install -y cmake gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          sudo apt-get install -y libffi-dev:arm64 libssl-dev:arm64

      - name: Write ARM64 toolchain file
        if: matrix.cross
        shell: bash
        run: |
          mkdir -p .github/toolchains
          cat > .github/toolchains/linux-arm64.cmake << 'EOF'
          set(CMAKE_SYSTEM_NAME Linux)
          set(CMAKE_SYSTEM_PROCESSOR aarch64)
          set(CMAKE_C_COMPILER   aarch64-linux-gnu-gcc)
          set(CMAKE_CXX_COMPILER aarch64-linux-gnu-g++)
          set(CMAKE_SYSROOT /usr/aarch64-linux-gnu)
          set(CMAKE_FIND_ROOT_PATH /usr/aarch64-linux-gnu)
          set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
          set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_PACKAGE ONLY)
          set(CMAKE_LIBRARY_ARCHITECTURE aarch64-linux-gnu)
          EOF

      # ── macOS ────────────────────────────────────────────────
      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: brew install libffi openssl cmake

      # ── Windows (MinGW via MSYS2) ────────────────────────────
      - name: Install deps (Windows MinGW)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          C:\msys64\usr\bin\bash.exe -lc "pacman -Sy --noconfirm mingw-w64-x86_64-gcc mingw-w64-x86_64-cmake mingw-w64-x86_64-libffi mingw-w64-x86_64-openssl"

      # ── Configure ────────────────────────────────────────────
      - name: Configure (Linux native)
        if: runner.os == 'Linux' && !matrix.cross
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: |
          OPENSSL_ROOT=$(brew --prefix openssl)
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DOPENSSL_ROOT_DIR=$OPENSSL_ROOT \
            -DFFI_INCLUDE_DIR=$(brew --prefix libffi)/include \
            -DFFI_LIBRARY=$(brew --prefix libffi)/lib/libffi.dylib

      - name: Configure (Windows MinGW)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:PATH = "C:\msys64\mingw64\bin;$env:PATH"
          cmake -B build -G "MinGW Makefiles" `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_COMPILER="C:/msys64/mingw64/bin/gcc.exe" `
            -DCMAKE_CXX_COMPILER="C:/msys64/mingw64/bin/g++.exe" `
            -DOPENSSL_ROOT_DIR="C:/msys64/mingw64" `
            -DFFI_INCLUDE_DIR="C:/msys64/mingw64/include" `
            -DFFI_LIBRARY="C:/msys64/mingw64/lib/libffi.a"

      - name: Configure (Linux ARM64 cross)
        if: matrix.cross
        env:
          PKG_CONFIG_PATH: ""
          PKG_CONFIG_LIBDIR: /usr/lib/aarch64-linux-gnu/pkgconfig:/usr/aarch64-linux-gnu/lib/pkgconfig:/usr/share/pkgconfig
          PKG_CONFIG_SYSROOT_DIR: /
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=.github/toolchains/linux-arm64.cmake

      # ── Build ────────────────────────────────────────────────
      - name: Build (non-Windows)
        if: runner.os != 'Windows'
        run: cmake --build build --config Release -j4

      - name: Build (Windows MinGW)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:PATH = "C:\msys64\mingw64\bin;$env:PATH"
          cmake --build build --config Release -j4

      # ── Collect ──────────────────────────────────────────────
      - name: Collect binaries (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir dist
          cp build/novac dist/ 2>/dev/null || true
          cp "build/nv+" dist/ 2>/dev/null || true

      - name: Collect binaries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist
          Copy-Item build\novac.exe  dist\ -ErrorAction SilentlyContinue
          Copy-Item "build\nv+.exe"  dist\ -ErrorAction SilentlyContinue

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/
          if-no-files-found: warn